<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #5adce0;
        }

        .container {
            width: 350px;
            margin: auto;
            padding: 20px;
            background: rgb(198, 233, 38);
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkblue;
        }

        h3 {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>

    <input type="number" id="sub1" placeholder="Subject 1 Marks"><br>
    <input type="number" id="sub2" placeholder="Subject 2 Marks"><br>
    <input type="number" id="sub3" placeholder="Subject 3 Marks"><br>
    <input type="number" id="sub4" placeholder="Subject 4 Marks"><br>
    <input type="number" id="sub5" placeholder="Subject 5 Marks"><br><br>

    <button onclick="calculateGrade()">Calculate Result</button>

    <h3 id="result"></h3>
</div>

<script>
function calculateGrade() {
    let s1 = Number(document.getElementById("sub1").value);
    let s2 = Number(document.getElementById("sub2").value);
    let s3 = Number(document.getElementById("sub3").value);
    let s4 = Number(document.getElementById("sub4").value);
    let s5 = Number(document.getElementById("sub5").value);

    let total = s1 + s2 + s3 + s4 + s5;
    let percentage = total / 5;

    let grade;

    if (percentage >= 90)
        grade = "A+";
    else if (percentage >= 80)
        grade = "A";
    else if (percentage >= 70)
        grade = "B";
    else if (percentage >= 60)
        grade = "C";
    else if (percentage >= 50)
        grade = "D";
    else
        grade = "F";

    let status = (percentage >= 40) ? "Pass" : "Fail";

    document.getElementById("result").innerHTML =
        "Total Marks: " + total +
        "<br>Percentage: " + percentage.toFixed(2) + "%" +
        "<br>Grade: " + grade +
        "<br>Status: " + status;
}
</script>

</body>
</html>
